<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Échecs IA</title>
<link rel="stylesheet" href="chess.css">
</head>
<body>

<!-- ══ MODALE NOUVELLE PARTIE ══════════════════════════════════════════════ -->
<div id="modal-new" class="modal-bg">
  <div class="modal-box">
    <h2>♟ Échecs IA</h2>
    <div class="form-group">
      <label>Mode de jeu</label>
      <div class="radio-group">
        <label><input type="radio" name="mode" value="vs_ia" checked onchange="onModeChange()"> Contre l'IA</label>
        <label><input type="radio" name="mode" value="local_2p" onchange="onModeChange()"> 2 joueurs (local)</label>
        <label><input type="radio" name="mode" value="online" onchange="onModeChange()"> 2 joueurs (en ligne)</label>
      </div>
    </div>
    <div class="form-group">
      <label for="inp-name">Votre pseudo</label>
      <input id="inp-name" type="text" value="Joueur" maxlength="20">
    </div>
    <div id="ai-options">
      <div class="form-group">
        <label for="inp-level">Niveau IA</label>
        <select id="inp-level">
          <option value="Débutant">Débutant</option>
          <option value="Amateur">Amateur</option>
          <option value="Confirmé" selected>Confirmé</option>
          <option value="Expert">Expert</option>
        </select>
      </div>
      <div class="form-group">
        <label>Jouer avec</label>
        <div class="radio-group">
          <label><input type="radio" name="color" value="w" checked> ♔ Blancs (premier)</label>
          <label><input type="radio" name="color" value="b"> ♚ Noirs (second)</label>
        </div>
      </div>
    </div>
    <div id="p2-options" style="display:none">
      <div class="form-group">
        <label for="inp-p2">Joueur 2</label>
        <input id="inp-p2" type="text" value="Joueur 2" maxlength="20">
      </div>
    </div>
    <div id="online-options" style="display:none">
      <div class="form-group">
        <div class="radio-group">
          <label><input type="radio" name="online-action" value="create" checked onchange="onOnlineActionChange()"> Créer une salle</label>
          <label><input type="radio" name="online-action" value="join" onchange="onOnlineActionChange()"> Rejoindre</label>
        </div>
      </div>
      <div id="join-code-wrap" style="display:none">
        <div class="form-group">
          <label for="inp-room-code">Code de la salle</label>
          <input id="inp-room-code" type="text" maxlength="6" placeholder="ABC123" style="text-transform:uppercase;letter-spacing:4px;font-size:1.2em;text-align:center">
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button id="btn-start" class="btn-primary" onclick="startGame()">Commencer</button>
      <button class="btn-secondary" onclick="showElo()">🏆 Classement Elo</button>
    </div>
  </div>
</div>

<!-- ══ LOBBY ════════════════════════════════════════════════════════════════ -->
<div id="lobby-overlay" style="display:none">
  <div class="modal-box" style="max-width:400px;text-align:center">
    <div style="font-size:2em">🌐</div>
    <h2 id="lobby-title">Salle créée !</h2>
    <p>Partagez ce code à votre adversaire :</p>
    <div id="lobby-code" style="font-size:2.5em;letter-spacing:10px;font-weight:700;color:#4f46e5;margin:12px 0">——</div>
    <div id="lobby-status" style="color:#888;font-size:0.9em;margin-bottom:16px">En attente de l'adversaire…</div>
    <button class="btn-secondary" onclick="cancelLobby()">Annuler</button>
  </div>
</div>

<!-- ══ MODALE ELO ══════════════════════════════════════════════════════════ -->
<div id="modal-elo" class="modal-bg" style="display:none">
  <div class="modal-box">
    <h3>🏆 Classement Elo</h3>
    <div id="elo-list" style="max-height:300px;overflow-y:auto"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeElo()">Fermer</button>
    </div>
  </div>
</div>

<!-- ══ MODALE PROMOTION ════════════════════════════════════════════════════ -->
<div id="modal-promo" class="modal-bg" style="display:none">
  <div class="modal-box" style="text-align:center">
    <h3>Promotion du pion</h3>
    <div id="promo-choices" style="display:flex;gap:16px;justify-content:center;font-size:3em;margin:16px 0"></div>
  </div>
</div>

<!-- ══ MODALE FIN DE PARTIE ════════════════════════════════════════════════ -->
<div id="modal-gameover" class="modal-bg" style="display:none">
  <div class="modal-box" style="text-align:center">
    <div id="go-icon" style="font-size:3em"></div>
    <h2 id="go-title"></h2>
    <p id="go-reason" style="color:#888"></p>
    <div id="go-elo" style="margin:12px 0;font-size:0.9em;color:#555"></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="closeGameOver()">Nouvelle partie</button>
    </div>
  </div>
</div>

<!-- ══ APP PRINCIPALE ══════════════════════════════════════════════════════ -->
<div id="app" style="display:none">
  <header id="top-bar">
    <div class="top-left">
      <span class="logo">♟ Échecs IA</span>
      <span id="mode-badge" class="badge"></span>
    </div>
    <div class="top-center" id="status-msg"></div>
    <div class="top-right">
      <button class="btn-sm" onclick="showNewGame()">⊕ Nouvelle partie</button>
      <button class="btn-sm" onclick="showElo()">🏆 Elo</button>
    </div>
  </header>

  <div id="main-area">
    <!-- Infos joueur noir (haut) -->
    <div id="info-black" class="player-info">
      <div class="player-name" id="name-black">—</div>
      <div class="captured-row" id="cap-black"></div>
      <div class="elo-badge" id="elo-black"></div>
    </div>

    <!-- Plateau -->
    <div id="board-wrap">
      <div id="coord-top" class="coords-h"></div>
      <div id="board-row">
        <div id="coord-left" class="coords-v"></div>
        <div id="board"></div>
        <div id="coord-right" class="coords-v"></div>
      </div>
      <div id="coord-bottom" class="coords-h"></div>
    </div>

    <!-- Infos joueur blanc (bas) -->
    <div id="info-white" class="player-info">
      <div class="player-name" id="name-white">—</div>
      <div class="captured-row" id="cap-white"></div>
      <div class="elo-badge" id="elo-white"></div>
    </div>

    <!-- Historique -->
    <aside id="history-panel">
      <div class="panel-title">Historique</div>
      <div id="move-list"></div>
    </aside>
  </div>

  <!-- Barre d'actions -->
  <div id="action-bar">
    <button class="btn-secondary" id="btn-resign" onclick="resign()">🏳 Abandonner</button>
    <button class="btn-secondary" onclick="flipBoard()">🔄 Retourner</button>
  </div>
</div>

<!-- Overlay attente tour en ligne -->
<div id="waiting-overlay" style="display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);color:#fff;text-align:center;padding:14px;z-index:50">
  ⏳ En attente du coup de <span id="waiting-name" style="font-weight:700"></span>…
</div>

<div id="toast"></div>
<script src="chess.js"></script>
</body>
</html>
